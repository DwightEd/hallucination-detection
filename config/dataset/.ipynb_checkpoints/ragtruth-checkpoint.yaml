# =============================================================================
# RAGTruth Dataset Configuration
# =============================================================================

name: ragtruth
path: /share/home/tm902089733300000/a903202310/lys/data/RAGTruth/dataset
cls_path: src.data.ragtruth.RAGTruthDataset

# =============================================================================
# 数据过滤选项
# =============================================================================

splits:
  - test
  - train

# 特征提取时使用的数据分割 (train/test)
# 此参数由 DVC pipeline 通过命令行覆盖
split_name: train

# 任务类型过滤
task_type: null

# 源模型过滤
models: [mistral-7B-instruct]

# 最大样本数
max_samples: null

# 质量排除
exclude_quality:
  - incorrect_refusal
  - truncated

# =============================================================================
# 特征提取配置
# =============================================================================

max_answer_tokens: 512
target_column_name: response
test_split_name: test

# =============================================================================
# 高级选项
# =============================================================================

include_metadata: true
validate_data: true

cache:
  enabled: true
  path: ${base_dir}/cache/ragtruth
