# HaloScope - 基于隐藏状态SVD的幻觉检测
# 论文: https://arxiv.org/abs/2409.17504 (NeurIPS'24)
# 特点: 不需要 full_attention，显存友好

name: haloscope
cls_path: src.methods.haloscope.HaloScopeMethod
classifier: logistic
cv_folds: 5
random_seed: ${seed}

# 特征需求: 只需要 hidden_states
required_features:
  attention_diags: false
  laplacian_diags: false
  attention_entropy: false
  full_attention: false
  hidden_states: true
  token_probs: false
  token_entropy: false

params:
  # 检测配置
  detection:
    weighted_svd: true        # 使用加权SVD
    feat_loc_svd: 3           # 特征位置 (0=第一个, -1=最后, 3=第四个token)
    layer_selection: last_half  # 层选择: all, last_half, last_quarter, specific
    specific_layers: []       # layer_selection=specific 时使用
  
  # SVD 分解配置
  svd_config:
    n_components: 10          # 主成分数量
    center: true              # 是否中心化
    normalize: false          # 是否标准化
  
  # 输出配置  
  output:
    save_svd_model: true
    save_intermediate: false